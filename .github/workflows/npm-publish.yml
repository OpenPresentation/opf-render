name: Publish OPF Render npm package

on:
  push:
    tags:
      - "opf-render-v*"
      - "@openpresentation/opf-render@v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    name: Publish @openpresentation/opf-render
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: OpenPresentation/opf
          ref: 29713f534a917e327e5e8fdf9a5ba72b4ae6bdf0
          path: opf-corpus
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - name: Use npm 11 for provenance
        run: |
          npm install -g 'npm@>=11.5.1 <12'
          npm --version
      - run: npm ci
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          case "${GITHUB_REF_NAME}" in
            "opf-render-v${VERSION}"|"@openpresentation/opf-render@v${VERSION}") ;;
            *)
              echo "Tag ${GITHUB_REF_NAME} does not match @openpresentation/opf-render version ${VERSION}."
              exit 1
              ;;
          esac
      - run: npm run build
      - run: npm run typecheck
      - run: npm run validate
      - run: npm test
        env:
          OPF_EXAMPLES_DIR: opf-corpus/examples
      - name: Verify npm package contents
        run: npm pack --dry-run
      - run: npm publish --access public --provenance
